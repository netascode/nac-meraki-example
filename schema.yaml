---
meraki: include('meraki')
defaults: any(required=False)
---
meraki:
  domains: list(include('domains'), required=False)
  template: include('template', required=False)
domains:
  name: str(min=1, max=127)
  url: str(min=1, max=255, required=False)
  organizations: list(include('organizations'))
template:
  networks: list(include('networks'), required=False)
organizations:
  name: str(min=1, max=127, required=False)
  managed: bool(required=False)
  login_security: include('organizations_login_security',required=False)
  networks: list(include('networks'),required=False)
  snmp: include('organizations_snmp',required=False)
organizations_login_security:
  password_expiration_days: int(min=1, max=365, required=False)
  num_different_passwords: int(min=1, max=10, required=False)
organizations_snmp:
  v2c: bool(required=False)
  v3: bool(required=False)
networks:
  name: str(min=1, max=127)